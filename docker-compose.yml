services:
  # ─── PostgreSQL 17 ────────────────────────────
  db:
    image: mirror.gcr.io/library/postgres:17-alpine
    container_name: origineo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-origineo}
      POSTGRES_USER: ${DB_USER:-origineo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-origineo_secret_change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-origineo} -d ${DB_NAME:-origineo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── NestJS API ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: origineo-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-origineo}:${DB_PASSWORD:-origineo_secret_change_me}@db:5432/${DB_NAME:-origineo}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_random_64_char_string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      API_PORT: ${API_PORT:-3001}
      STORAGE_PATH: /app/storage
      NODE_ENV: development
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages:/app/packages
      - filedata:/app/storage
    depends_on:
      db:
        condition: service_healthy

  # ─── Next.js Frontend ────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: origineo-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages:/app/packages
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
  filedata:
    driver: local

